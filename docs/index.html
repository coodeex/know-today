<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Daily Briefings</title>
  <style>
    :root { color-scheme: light; --ink: #172033; --muted: #526078; --line: #d8e0eb; --canvas: #f4f7fb; --surface: #fff; --blue: #0b63b6; }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--canvas); color: var(--ink); font: 16px/1.55 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 760px; margin: 0 auto; padding: 56px 20px; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 3rem); }
    p { color: var(--muted); }
    a { color: var(--blue); text-underline-offset: 3px; }
    .briefing { display: block; padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 14px; text-decoration: none; color: inherit; }
    .briefing:hover { border-color: var(--blue); }
    .date { margin: 0 0 5px; font-size: .82rem; letter-spacing: .08em; font-weight: 700; text-transform: uppercase; }
    h2 { margin: 0; font-size: 1.25rem; }
  </style>
</head>
<body>
  <main>
    <h1>Daily briefings</h1>
    <p>Concise, evidence-aware summaries of selected sources.</p>
    <a class="briefing" href="briefings/2026-07-17.html">
      <p class="date">17 July 2026</p>
      <h2>AI workflows and iterative product development</h2>

    </a>
  </main>
</body>
</html>
